<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zygolabs Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron',sans-serif;
}

body{
  background: radial-gradient(circle at center, #0f0f17 0%, #050508 100%);
  overflow:hidden;
  color:white;
}

/* ================= ENTER SCREEN ================= */

.enter-screen{
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
  z-index:9999;
  transition:1s ease;
}

.enter-btn{
  padding:25px 60px;
  font-size:28px;
  letter-spacing:4px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  color:white;
  background:linear-gradient(90deg,#00ffff,#ff00ff,#00ffff);
  background-size:300%;
  animation:glow 4s linear infinite;
  box-shadow:0 0 30px #00ffff, 0 0 60px #ff00ff;
  transition:0.4s;
}

.enter-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 60px #00ffff, 0 0 120px #ff00ff;
}

@keyframes glow{
  0%{background-position:0%;}
  100%{background-position:300%;}
}

/* ================= MAIN UI ================= */

.main{
  opacity:0;
  transition:1.5s ease;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

.hud{
  position:fixed;
  top:20px;
  right:20px;
  font-size:12px;
  opacity:0.8;
  z-index:3;
}

.avatar{
  position:fixed;
  bottom:20px;
  left:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
  animation:spin 10s linear infinite;
  z-index:3;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.container{
  display:flex;
  justify-content:center;
  margin-top:150px;
  position:relative;
  z-index:2;
}

.card{
  width:700px;
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(20,20,30,0.7);
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 60px rgba(0,255,255,0.3);
}

.face{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00ffff;
  box-shadow:0 0 20px #00ffff;
}

.text-area{
  margin-top:20px;
  min-height:200px;
  font-size:16px;
  line-height:1.6;
  white-space:pre-line;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ENTER SCREEN */
.enter-screen {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at bottom, #0d0d1a 0%, #000000 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  transition: opacity 1s ease;
}

/* CANVAS */
#galaxyCanvas {
  position: absolute;
  inset: 0;
  z-index: 0;
}

/* BUTTON */
.enter-btn {
  position: relative;
  z-index: 2;
  padding: 25px 60px;
  font-size: 28px;
  letter-spacing: 4px;
  font-weight: 700;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 60px;
  background: rgba(255,255,255,0.05);
  color: white;
  backdrop-filter: blur(15px);
  cursor: pointer;
  overflow: hidden;
  transition: all 0.4s ease;
  box-shadow: 0 0 20px rgba(0,150,255,0.4),
              0 0 40px rgba(0,150,255,0.2),
              inset 0 0 15px rgba(255,255,255,0.05);
}

/* Glow pulse */
.enter-btn::before {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 60px;
  background: linear-gradient(45deg,#00f2ff,#8f00ff,#00f2ff);
  z-index: -1;
  animation: glowRotate 4s linear infinite;
}

@keyframes glowRotate {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

/* Hover */
.enter-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 40px rgba(0,150,255,0.8),
              0 0 80px rgba(0,150,255,0.6);
}

/* Click Warp Effect */
.enter-btn.warp {
  animation: warpOut 1s forwards;
}

@keyframes warpOut {
  0% { transform: scale(1); }
  50% { transform: scale(8); opacity: 1; }
  100% { transform: scale(40); opacity: 0; }
}
</style>
</head>
<body>

<div class="enter-screen" id="enterScreen">

  <canvas id="galaxyCanvas"></canvas>
  <button class="enter-btn" id="enterBtn">ENTER ZYGOLABS</button>
</div>

<!-- MAIN UI -->
<div class="main" id="mainUI">
 
<canvas id="bg"></canvas>

<div class="hud">
  <div>Status: ONLINE</div>
  <div>Mode: ASCENSION</div>
  <div>Rank: Unrated</div>
  <a href="home.html" class="btn2" id="startBtn1">Get Started</a>
</div>

<img src="https://i.looksmax.org/attachments/2022/05/2876140_looksmaxmorph.jpg" class="avatar">

<div class="container">
<div class="card">
  <img src="https://i.looksmax.org/attachments/2022/05/2876140_looksmaxmorph.jpg" class="face">
  <div class="text-area" id="text"></div>
  <a href="home.html" class="btn" id="startBtn" style="display:none;">Get Started</a>
</div>
</div>

</div>

<audio id="bgVoice">
  <source src="bg.mp3" type="audio/mpeg">
</audio>
<audio id="bgVoice2">
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<script>

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(0,255,255,0.7)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.d;
    if(p.y>canvas.height)p.y=0;
  });
  requestAnimationFrame(draw);
}

/* ENTER BUTTON LOGIC */
const enterBtn=document.getElementById("enterBtn");
const enterScreen=document.getElementById("enterScreen");
const mainUI=document.getElementById("mainUI");
const audio=document.getElementById("bgVoice");

const canvas2 = document.getElementById("galaxyCanvas");


let stars = [];
let starCount = 800;
let speed = 0.5;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

function createStars() {
  stars = [];
  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      z: Math.random() * canvas.width
    });
  }
}
createStars();

function drawStars() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas2.width, canvas2.height);

  for (let i = 0; i < stars.length; i++) {
    let star = stars[i];

    star.z -= speed;
    if (star.z <= 0) {
      star.z = canvas2.width;
    }

    let k = 128.0 / star.z;
    let px = star.x * k + canvas2.width / 2;
    let py = star.y * k + canvas2.height / 2;

    if (px >= 0 && px <= canvas2.width && py >= 0 && py <= canvas2.height) {
      let size = (1 - star.z / canvas2.width) * 3;
      ctx.fillStyle = "white";
      ctx.fillRect(px, py, size, size);
    }
  }

  requestAnimationFrame(drawStars);
}
drawStars();
const bgVoice = document.getElementById("bgVoice");
const bgVoice2 = document.getElementById("bgVoice2");
bgVoice.volume = 0; // start silent
bgVoice.loop = false; // change to true if you want it looping

/* WARP SPEED ON ENTER */
enterBtn.addEventListener("click", function () {
  // Play audio (allowed because user clicked)
  bgVoice.play().catch(err => console.log("Audio blocked:", err));
bgVoice2.play()
  // Smooth volume fade in
  let vol = 0;
  const fadeAudio = setInterval(() => {
    if (vol < 1) {
      vol += 0.02;
      bgVoice.volume = vol;
    } else {
      clearInterval(fadeAudio);
    }
  }, 30);
  enterBtn.classList.add("warp");
  speed = 20; // hyperspace

  setTimeout(() => {
    enterScreen.style.opacity = "0";

    setTimeout(() => {
      enterScreen.style.display = "none";
      mainUI.style.opacity = "1";
      document.body.style.overflow = "auto";
      draw();
      type();
    }, 1000);

  }, 700);

});

/* TYPING */
const messages=[
"Welcome To Zygolabs.",
"Hi I Am Chad",
"You can become like me too",
"You just need to know where you stand in scale",
"Your positive and negative points",
"How much appeal you have to women",
"Compete with others and win prizes",
"Your Overall plan to become like me",
"This is the best face rating software.",
"This is what our community is",
"- Your rating",
"- Leaderboard",
"- Ranked 1 Chads",
"- Fight with others in mog battles to gain xp points",
"Ascend Today",
"Then choose who you become."
];

let textArea=document.getElementById("text");
let btn=document.getElementById("startBtn");
let i=0,j=0;

function type(){
  if(i<messages.length){
    if(j<messages[i].length){
      textArea.innerHTML+=messages[i].charAt(j);
      j++;
      setTimeout(type,55);
    }else{
      textArea.innerHTML+="\n";
      j=0;i++;
      setTimeout(type,1000);
    }
  }else{
    btn.style.display="inline-block";
  }
}

</script>

</body>
</html>
